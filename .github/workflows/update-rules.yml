name: Update Sing-box Rule Sets

on:
  schedule:
    # 北京时间(UTC+8) 00:00:00 = UTC 16:00 (前一天)
    - cron: '0 16 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

env:
  SING_BOX_VERSION: "1.11.15"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install sing-box
        run: |
          curl -fsSL https://sing-box.app/install.sh | sh -s -- --version "${SING_BOX_VERSION}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          which sing-box || sing-box version

      - name: Run update script
        run: python3 scripts/update_rules.py

      - name: Commit and push updated rule sets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rules/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto-update sing-box rule sets ($(date -u +'%Y-%m-%d %H:%M:%S') UTC)"
            git push
          fi
